<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>FitLink — Something Is Coming</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@200;300;400;500;600;700;800;900&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    min-height: 100vh;
    overflow-x: hidden;
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    background: #050505;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    color: #FAFAFA;
  }

  ::selection { background: rgba(220,38,38,0.35); color: #fff; }

  .stage {
    position: relative;
    width: 100vw;
    min-height: 100vh;
    overflow: hidden;
    padding: 14px;
  }

  .canvas {
    position: relative;
    width: 100%;
    min-height: calc(100vh - 28px);
    border-radius: 24px;
    overflow: hidden;
    background: #0A0A0A;
    display: flex;
    flex-direction: column;
    padding: 26px 40px 22px;
  }

  /* ═══════════════════════════════════════════
     VIVID GRADIENT — inspired by the reference
     ═══════════════════════════════════════════ */
  .gradient-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(circle at 12% 25%, #DC2626 0%, transparent 40%),
      radial-gradient(circle at 85% 12%, #f97316 0%, transparent 38%),
      radial-gradient(circle at 92% 82%, #DC2626 0%, transparent 38%),
      radial-gradient(circle at 6% 85%, #9f1239 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, #7F1D1D 0%, transparent 55%),
      radial-gradient(circle at 35% 70%, #b91c1c 0%, transparent 35%),
      #0A0A0A;
    background-size: 160% 160%;
    animation: gradMove 20s ease-in-out infinite;
  }

  .bg-orbits {
    position: absolute;
    inset: -18%;
    z-index: 1;
    pointer-events: none;
    background:
      conic-gradient(from 130deg at 48% 52%, rgba(220,38,38,0.24), rgba(249,115,22,0.05), rgba(127,29,29,0.2), rgba(220,38,38,0.24)),
      radial-gradient(circle at 50% 50%, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0) 55%);
    mix-blend-mode: screen;
    filter: blur(30px);
    animation: orbitSpin 24s linear infinite;
  }

  .bg-lines {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0.14;
    background-image:
      repeating-linear-gradient(65deg, rgba(255,255,255,0.08) 0 1px, transparent 1px 48px),
      repeating-linear-gradient(-65deg, rgba(220,38,38,0.08) 0 1px, transparent 1px 56px);
    mask-image: radial-gradient(circle at 50% 50%, rgba(0,0,0,1) 35%, rgba(0,0,0,0) 90%);
  }

  .bg-dumbbell {
    position: absolute;
    left: 50%;
    top: 53%;
    width: min(86vw, 1020px);
    transform: translate(-50%, -50%) rotate(-8deg);
    z-index: 3;
    pointer-events: none;
    opacity: 0.62;
    mix-blend-mode: screen;
    filter: saturate(1.2) contrast(1.08) drop-shadow(0 18px 66px rgba(0,0,0,0.6));
    animation: dumbbellDrift 9s ease-in-out infinite;
  }

  .bg-dumbbell-glow {
    position: absolute;
    left: 50%;
    top: 53%;
    width: min(88vw, 1080px);
    height: min(24vw, 280px);
    transform: translate(-50%, -50%) rotate(-8deg);
    z-index: 2;
    pointer-events: none;
    border-radius: 999px;
    background:
      radial-gradient(ellipse at 50% 50%, rgba(255,255,255,0.24) 0%, rgba(255,255,255,0.06) 44%, rgba(255,255,255,0) 72%),
      linear-gradient(120deg, rgba(255,255,255,0.12), rgba(255,255,255,0));
    filter: blur(18px);
    opacity: 0.5;
    animation: dumbbellGlowPulse 6s ease-in-out infinite;
  }

  @keyframes gradMove {
    0%,100% { background-position: 0% 0%, 100% 0%, 100% 100%, 0% 100%, 50% 50%, 30% 70%, center; }
    50% { background-position: 20% 15%, 80% 20%, 85% 70%, 15% 80%, 55% 45%, 40% 60%, center; }
  }

  @keyframes orbitSpin {
    from { transform: rotate(0deg) scale(1); }
    to { transform: rotate(360deg) scale(1.03); }
  }

  @keyframes dumbbellDrift {
    0%, 100% { transform: translate(-50%, -50%) rotate(-8deg) scale(1); }
    50% { transform: translate(-50%, -52%) rotate(-4deg) scale(1.03); }
  }

  @keyframes dumbbellGlowPulse {
    0%, 100% { opacity: 0.42; }
    50% { opacity: 0.62; }
  }

  /* Softer center so text pops, darker edges for depth */
  .vignette {
    position: absolute;
    inset: 0;
    z-index: 1;
    background:
      radial-gradient(ellipse 70% 65% at 50% 48%, rgba(0,0,0,0.24) 0%, rgba(0,0,0,0.64) 100%);
    pointer-events: none;
  }

  .grain {
    position: absolute;
    inset: 0;
    z-index: 2;
    opacity: 0.04;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    mix-blend-mode: overlay;
  }

  /* ── Vertical side labels ── */
  .v-label {
    position: absolute;
    z-index: 6;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.15);
    writing-mode: vertical-rl;
    pointer-events: none;
    user-select: none;
    text-shadow: 0 1px 8px rgba(0,0,0,0.5);
  }
  .v-label.l { left: 40px; top: 50%; transform: translateY(-50%) rotate(180deg); }
  .v-label.r { right: 40px; top: 50%; transform: translateY(-50%); }

  /* ═══════════════════════════════════════════
     TOP BAR
     ═══════════════════════════════════════════ */
  .top-bar {
    position: relative;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: auto;
  }

  .nav-pill {
    background: rgba(10, 10, 10, 0.88);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 100px;
    padding: 10px 20px;
    color: #FAFAFA;
    font-size: 13px;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    font-family: 'Outfit', sans-serif;
    letter-spacing: 0.02em;
  }
  .nav-pill .logo-mini { width: 18px; height: 18px; flex-shrink: 0; }

  .nav-center {
    background: rgba(10, 10, 10, 0.88);
    backdrop-filter: blur(20px);
    border-radius: 100px;
    padding: 10px 20px;
    border: 1px solid rgba(255,255,255,0.08);
    color: #FAFAFA;
    font-size: 13px;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: 'Space Grotesk', sans-serif;
    letter-spacing: 0.01em;
  }

  .live-dot {
    width: 7px;
    height: 7px;
    background: #22c55e;
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.6); }
    50% { box-shadow: 0 0 0 7px rgba(34,197,94,0); }
  }

  .nav-loc {
    background: rgba(10, 10, 10, 0.88);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 100px;
    padding: 10px 20px;
    border: 1px solid rgba(255,255,255,0.08);
    color: #FAFAFA;
    font-size: 13px;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 9px;
    font-family: 'Space Grotesk', sans-serif;
    letter-spacing: 0.01em;
  }

  .nav-loc .flag {
    font-size: 15px;
    line-height: 1;
  }

  .nav-loc .city {
    color: rgba(255,255,255,0.5);
    font-weight: 400;
  }

  .nav-pill,
  .nav-center,
  .nav-loc,
  .tagline-box,
  .cta-btn,
  .foot-credit,
  .foot-copy {
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.05) 42%, rgba(8,8,8,0.5) 100%);
    backdrop-filter: blur(28px) saturate(145%);
    -webkit-backdrop-filter: blur(28px) saturate(145%);
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.35),
      inset 0 -1px 0 rgba(255,255,255,0.06),
      0 10px 34px rgba(0,0,0,0.28);
  }

  .nav-pill::before,
  .nav-center::before,
  .nav-loc::before,
  .tagline-box::before,
  .cta-btn::before,
  .foot-credit::before,
  .foot-copy::before {
    content: '';
    position: absolute;
    left: 8%;
    right: 8%;
    top: 0;
    height: 45%;
    background: linear-gradient(180deg, rgba(255,255,255,0.4), rgba(255,255,255,0));
    opacity: 0.42;
    pointer-events: none;
  }

  .tool-box {
    isolation: isolate;
  }

  .tool-dumbbell {
    padding-left: 24px;
    padding-right: 24px;
    background:
      radial-gradient(circle at 8% 50%, rgba(220,38,38,0.86) 0 8px, transparent 9px),
      radial-gradient(circle at 92% 50%, rgba(220,38,38,0.86) 0 8px, transparent 9px),
      linear-gradient(90deg, transparent 13%, rgba(255,255,255,0.22) 45%, transparent 87%),
      linear-gradient(135deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.05) 42%, rgba(8,8,8,0.5) 100%);
  }

  .tool-plate {
    background:
      radial-gradient(circle at 50% 50%, rgba(220,38,38,0.38) 0 13%, transparent 14%),
      radial-gradient(circle at 50% 50%, rgba(255,255,255,0.23) 0 5%, transparent 6%),
      linear-gradient(135deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.05) 42%, rgba(8,8,8,0.5) 100%);
  }

  .tool-kettlebell {
    background:
      radial-gradient(ellipse 24% 35% at 50% 6%, rgba(255,255,255,0.33) 0 48%, transparent 49%),
      linear-gradient(180deg, rgba(220,38,38,0.16) 0%, rgba(220,38,38,0) 40%),
      linear-gradient(135deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.05) 42%, rgba(8,8,8,0.5) 100%);
  }

  .tool-rack {
    background:
      repeating-linear-gradient(90deg, rgba(255,255,255,0.08) 0 9px, transparent 9px 30px),
      linear-gradient(135deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.06) 42%, rgba(8,8,8,0.5) 100%);
  }

  .tool-bar {
    background:
      repeating-linear-gradient(90deg, rgba(255,255,255,0.1) 0 2px, transparent 2px 13px),
      linear-gradient(135deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.05) 42%, rgba(8,8,8,0.5) 100%);
  }

  .tool-plate-sm {
    background:
      radial-gradient(circle at 50% 50%, rgba(220,38,38,0.22) 0 12%, transparent 13%),
      linear-gradient(135deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.05) 42%, rgba(8,8,8,0.5) 100%);
  }

  /* ═══════════════════════════════════════════
     FLOATING GYM ELEMENTS
     ═══════════════════════════════════════════ */
  .floater {
    position: absolute;
    z-index: 4;
    pointer-events: none;
    filter: drop-shadow(0 12px 32px rgba(0,0,0,0.5));
    opacity: 0;
    animation-fill-mode: forwards;
  }

  .floater.f1 { width: 110px; top: 23%; left: 4%; animation: fi1 0.8s 0.2s forwards, fl1 8s 1s ease-in-out infinite; }
  .floater.f2 { width: 95px;  top: 16%; right: 5%; animation: fi2 0.8s 0.4s forwards, fl2 9s 1.2s ease-in-out infinite; }
  .floater.f3 { width: 80px;  bottom: 26%; left: 6%; animation: fi3 0.8s 0.6s forwards, fl3 10s 1.4s ease-in-out infinite; }
  .floater.f4 { width: 100px; bottom: 20%; right: 5%; animation: fi4 0.8s 0.8s forwards, fl4 8.5s 1.6s ease-in-out infinite; }
  .floater.f5 { width: 68px;  top: 52%; left: 1.5%; animation: fi5 0.8s 1s forwards, fl5 11s 1.8s ease-in-out infinite; }
  .floater.f6 { width: 72px;  top: 48%; right: 1.5%; animation: fi6 0.8s 1.2s forwards, fl6 10s 2s ease-in-out infinite; }
  .floater.f7 { width: 52px;  top: 34%; left: 15%; animation: fi7 0.8s 1.4s forwards, fl7 12s 2.2s ease-in-out infinite; }
  .floater.f8 { width: 48px;  bottom: 35%; right: 15%; animation: fi8 0.8s 1.6s forwards, fl8 11s 2.4s ease-in-out infinite; }

  @keyframes fi1 { to { opacity: 0.9; } }
  @keyframes fi2 { to { opacity: 0.85; } }
  @keyframes fi3 { to { opacity: 0.9; } }
  @keyframes fi4 { to { opacity: 0.85; } }
  @keyframes fi5 { to { opacity: 0.75; } }
  @keyframes fi6 { to { opacity: 0.75; } }
  @keyframes fi7 { to { opacity: 0.6; } }
  @keyframes fi8 { to { opacity: 0.6; } }

  @keyframes fl1 { 0%,100% { transform: translateY(0) rotate(-5deg); } 50% { transform: translateY(-22px) rotate(3deg); } }
  @keyframes fl2 { 0%,100% { transform: translateY(0) rotate(4deg); } 50% { transform: translateY(-18px) rotate(-4deg); } }
  @keyframes fl3 { 0%,100% { transform: translateY(0) rotate(-3deg); } 50% { transform: translateY(-16px) rotate(5deg); } }
  @keyframes fl4 { 0%,100% { transform: translateY(0) rotate(3deg); } 50% { transform: translateY(-20px) rotate(-5deg); } }
  @keyframes fl5 { 0%,100% { transform: translateX(0) rotate(-6deg); } 50% { transform: translateX(12px) rotate(2deg); } }
  @keyframes fl6 { 0%,100% { transform: translateX(0) rotate(5deg); } 50% { transform: translateX(-12px) rotate(-3deg); } }
  @keyframes fl7 { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-10px) scale(1.04); } }
  @keyframes fl8 { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-12px) scale(1.04); } }

  /* ═══════════════════════════════════════════
     HERO CENTER
     ═══════════════════════════════════════════ */
  .hero {
    position: relative;
    z-index: 5;
    text-align: center;
    margin: auto 0;
    padding: 20px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Tilted badge like the reference ── */
  .pre-badge {
    display: inline-block;
    background: #0A0A0A;
    color: #FAFAFA;
    padding: 9px 22px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    transform: rotate(-6deg);
    margin-bottom: -4px;
    position: relative;
    z-index: 3;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    margin-left: -320px;
    font-family: 'Outfit', sans-serif;
  }

  /* ── Giant 3D brand text like "CUSTOM CURSORS" ── */
  .brand-title {
    font-family: 'Outfit', sans-serif;
    font-size: clamp(76px, 15vw, 220px);
    font-weight: 900;
    letter-spacing: -0.04em;
    line-height: 0.88;
    position: relative;
    z-index: 2;
    /* Chrome/Safari 3D text */
    background: linear-gradient(180deg,
      #FFFFFF 0%,
      #FFFFFF 40%,
      #d9d9d9 60%,
      #8a8a8a 82%,
      #4a4a4a 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter:
      drop-shadow(0 2px 0 rgba(255,255,255,0.3))
      drop-shadow(0 4px 0 rgba(0,0,0,0.15))
      drop-shadow(0 25px 40px rgba(0,0,0,0.7))
      drop-shadow(0 50px 70px rgba(0,0,0,0.4));
    text-shadow: none;
  }

  /* ── Tagline area ── */
  .tagline-box {
    margin-top: 36px;
    max-width: 620px;
    padding: 24px 36px;
    background: rgba(10, 10, 10, 0.55);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .tagline {
    font-family: 'Outfit', sans-serif;
    font-size: clamp(18px, 2.6vw, 28px);
    font-weight: 400;
    color: rgba(255,255,255,0.85);
    line-height: 1.55;
    letter-spacing: -0.01em;
  }

  .tagline .accent {
    font-weight: 700;
    color: #FAFAFA;
    position: relative;
    display: inline-block;
  }

  .tagline .accent::after {
    content: '';
    position: absolute;
    bottom: 2px;
    left: 0;
    right: 0;
    height: 3px;
    background: #DC2626;
    border-radius: 2px;
    opacity: 0.8;
  }

  /* ── Bottom whisper & CTA ── */
  .bottom-section {
    margin-top: 36px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .whisper {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #FAFAFA;
    text-shadow: 0 2px 12px rgba(0,0,0,0.6);
  }

  .whisper .sep {
    display: inline-block;
    margin: 0 14px;
    color: #DC2626;
    font-size: 10px;
    vertical-align: middle;
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 34px;
    border-radius: 100px;
    background: rgba(10,10,10,0.75);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    color: #FAFAFA;
    text-decoration: none;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.02em;
    transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 6px 24px rgba(0,0,0,0.3);
  }

  .cta-btn:hover {
    background: linear-gradient(135deg, rgba(255,255,255,0.22) 0%, rgba(220,38,38,0.18) 44%, rgba(8,8,8,0.62) 100%);
    border-color: rgba(255,255,255,0.35);
    transform: translateY(-2px);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.46),
      0 12px 38px rgba(0,0,0,0.42);
  }

  .cta-btn svg { width: 15px; height: 15px; opacity: 0.7; flex-shrink: 0; }
  .cta-btn:hover svg { opacity: 1; }

  .cta-btn .arr {
    opacity: 0.5;
    transition: all 0.3s;
  }
  .cta-btn:hover .arr {
    opacity: 1;
    transform: translateX(3px);
  }

  /* ═══════════════════════════════════════════
     FOOTER — clearly visible
     ═══════════════════════════════════════════ */
  .foot {
    position: relative;
    z-index: 10;
    margin-top: auto;
    padding-top: 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .foot-credit {
    background: rgba(10,10,10,0.75);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 100px;
    padding: 10px 20px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    color: rgba(255,255,255,0.65);
    font-weight: 500;
  }

  .foot-credit .fn {
    color: #FAFAFA;
    font-weight: 700;
  }

  .foot-credit .ht {
    color: #DC2626;
    font-size: 12px;
  }

  .foot-copy {
    background: rgba(10,10,10,0.75);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 100px;
    padding: 10px 20px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: rgba(255,255,255,0.65);
  }

  /* ═══════════════════════════════════════════
     RESPONSIVE
     ═══════════════════════════════════════════ */
  @media (max-width: 800px) {
    .stage { padding: 8px; }
    .canvas { padding: 18px 16px 16px; min-height: calc(100vh - 16px); border-radius: 18px; }
    .bg-orbits { inset: -30%; filter: blur(24px); opacity: 0.8; }
    .bg-lines { opacity: 0.1; }
    .bg-dumbbell-glow { width: min(138vw, 820px); height: 180px; top: 56%; opacity: 0.46; }
    .bg-dumbbell { width: min(130vw, 760px); top: 56%; opacity: 0.44; }
    .top-bar { flex-wrap: wrap; gap: 8px; }
    .tool-dumbbell { padding-left: 16px; padding-right: 16px; }
    .nav-pill, .nav-center, .nav-loc { font-size: 10px; padding: 8px 14px; }
    .nav-center { display: none; }
    .v-label { display: none; }
    .pre-badge { margin-left: -120px; font-size: 9px; padding: 7px 14px; letter-spacing: 1.5px; }
