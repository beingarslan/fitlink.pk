<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>FitLink — Something Is Coming</title>
<meta name="description" content="FitLink — Pakistan's next-generation fitness platform. Launching soon.">
<meta name="theme-color" content="#050505">
<link rel="icon" type="image/svg+xml" href="FitLink Logos/05-app-icon-red.svg">
<link rel="shortcut icon" href="FitLink Logos/05-app-icon-red.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  /* ═══════════════════════════════════════════
     RESET & BASE
     ═══════════════════════════════════════════ */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-0: #050505;
    --bg-1: #0A0A0A;
    --fg: #FAFAFA;
    --fg-dim: rgba(250, 250, 250, 0.62);
    --fg-mute: rgba(250, 250, 250, 0.42);
    --line: rgba(255, 255, 255, 0.08);
    --line-strong: rgba(255, 255, 255, 0.14);
    --brand: #DC2626;
    --brand-2: #ef4444;
    --brand-deep: #7F1D1D;
    --accent: #f97316;
    --easing: cubic-bezier(0.22, 1, 0.36, 1);
  }

  html, body {
    width: 100%;
    min-height: 100vh;
    overflow-x: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-0);
    color: var(--fg);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }

  ::selection { background: rgba(220, 38, 38, 0.4); color: #fff; }

  a { color: inherit; text-decoration: none; }

  /* ═══════════════════════════════════════════
     LAYOUT SHELL
     ═══════════════════════════════════════════ */
  .stage {
    position: relative;
    width: 100vw;
    min-height: 100vh;
    overflow: hidden;
    padding: 14px;
  }

  .canvas {
    position: relative;
    width: 100%;
    min-height: calc(100vh - 28px);
    border-radius: 28px;
    overflow: hidden;
    background: var(--bg-1);
    display: flex;
    flex-direction: column;
    padding: 28px 44px 24px;
    isolation: isolate;
    box-shadow:
      0 1px 0 rgba(255, 255, 255, 0.04) inset,
      0 40px 80px -20px rgba(0, 0, 0, 0.7);
  }

  /* ═══════════════════════════════════════════
     BACKGROUND — refined gradient mesh
     ═══════════════════════════════════════════ */
  .bg-mesh {
    position: absolute;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(ellipse 60% 50% at 18% 22%, rgba(220, 38, 38, 0.55) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 88% 18%, rgba(249, 115, 22, 0.32) 0%, transparent 60%),
      radial-gradient(ellipse 55% 45% at 92% 88%, rgba(220, 38, 38, 0.45) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 8% 90%, rgba(127, 29, 29, 0.55) 0%, transparent 60%),
      radial-gradient(ellipse 80% 60% at 50% 50%, rgba(127, 29, 29, 0.18) 0%, transparent 70%),
      var(--bg-1);
    background-size: 140% 140%;
    animation: meshDrift 28s ease-in-out infinite;
    filter: saturate(1.05);
  }

  .bg-glow {
    position: absolute;
    inset: -20%;
    z-index: 1;
    pointer-events: none;
    background:
      conic-gradient(from 200deg at 50% 50%,
        rgba(220, 38, 38, 0.18),
        rgba(249, 115, 22, 0.04),
        rgba(127, 29, 29, 0.16),
        rgba(220, 38, 38, 0.18));
    mix-blend-mode: screen;
    filter: blur(60px);
    animation: glowSpin 40s linear infinite;
    opacity: 0.85;
  }

  .bg-grid {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0.18;
    background-image:
      linear-gradient(to right, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(ellipse 75% 70% at 50% 50%, #000 30%, transparent 90%);
    -webkit-mask-image: radial-gradient(ellipse 75% 70% at 50% 50%, #000 30%, transparent 90%);
  }

  .vignette {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    background:
      radial-gradient(ellipse 70% 60% at 50% 50%, rgba(0, 0, 0, 0.15) 0%, rgba(0, 0, 0, 0.7) 100%);
  }

  .grain {
    position: absolute;
    inset: 0;
    z-index: 3;
    opacity: 0.05;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    mix-blend-mode: overlay;
  }

  /* Centerpiece — refined dumbbell silhouette */
  .bg-centerpiece {
    position: absolute;
    left: 50%;
    top: 54%;
    width: min(82vw, 980px);
    transform: translate(-50%, -50%) rotate(-6deg);
    z-index: 3;
    pointer-events: none;
    opacity: 0.45;
    mix-blend-mode: screen;
    filter: drop-shadow(0 20px 60px rgba(0, 0, 0, 0.55));
    animation: centerpieceDrift 12s ease-in-out infinite;
  }

  .bg-centerpiece-glow {
    position: absolute;
    left: 50%;
    top: 54%;
    width: min(86vw, 1040px);
    height: min(22vw, 240px);
    transform: translate(-50%, -50%) rotate(-6deg);
    z-index: 2;
    pointer-events: none;
    border-radius: 999px;
    background: radial-gradient(ellipse at 50% 50%,
      rgba(255, 255, 255, 0.18) 0%,
      rgba(255, 255, 255, 0.04) 45%,
      transparent 75%);
    filter: blur(28px);
    opacity: 0.55;
    animation: centerpieceGlow 8s ease-in-out infinite;
  }

  @keyframes meshDrift {
    0%, 100% { background-position: 0% 0%, 100% 0%, 100% 100%, 0% 100%, 50% 50%, center; }
    50% { background-position: 12% 8%, 88% 12%, 88% 92%, 8% 92%, 55% 50%, center; }
  }

  @keyframes glowSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  @keyframes centerpieceDrift {
    0%, 100% { transform: translate(-50%, -50%) rotate(-6deg) scale(1); }
    50% { transform: translate(-50%, -52%) rotate(-3deg) scale(1.02); }
  }

  @keyframes centerpieceGlow {
    0%, 100% { opacity: 0.45; }
    50% { opacity: 0.65; }
  }

  /* ═══════════════════════════════════════════
     SHARED GLASS CHIP
     ═══════════════════════════════════════════ */
  .chip {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 10px 18px;
    border-radius: 999px;
    background: rgba(15, 15, 15, 0.55);
    border: 1px solid var(--line);
    backdrop-filter: blur(18px) saturate(1.4);
    -webkit-backdrop-filter: blur(18px) saturate(1.4);
    color: var(--fg);
    font-size: 12.5px;
    font-weight: 500;
    letter-spacing: 0.01em;
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.06),
      0 6px 24px rgba(0, 0, 0, 0.3);
  }

  /* ═══════════════════════════════════════════
     TOP BAR
     ═══════════════════════════════════════════ */
  .top-bar {
    position: relative;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .nav-brand {
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    letter-spacing: 0.01em;
    padding-right: 20px;
  }

  .nav-brand .logo-mini {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
  }

  .nav-status .live-dot {
    position: relative;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #22c55e;
    flex-shrink: 0;
  }

  .nav-status .live-dot::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    border: 1px solid #22c55e;
    animation: livePulse 2.2s ease-out infinite;
  }

  @keyframes livePulse {
    0% { transform: scale(0.8); opacity: 1; }
    100% { transform: scale(2); opacity: 0; }
  }

  .nav-loc .flag { font-size: 14px; line-height: 1; }
  .nav-loc .city { color: var(--fg-mute); font-weight: 400; }

  /* ═══════════════════════════════════════════
     SIDE LABELS
     ═══════════════════════════════════════════ */
  .v-label {
    position: absolute;
    z-index: 6;
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.18);
    writing-mode: vertical-rl;
    pointer-events: none;
    user-select: none;
  }
  .v-label.l { left: 28px; top: 50%; transform: translateY(-50%) rotate(180deg); }
  .v-label.r { right: 28px; top: 50%; transform: translateY(-50%); }

  /* ═══════════════════════════════════════════
     FLOATERS — subtler, refined
     ═══════════════════════════════════════════ */
  .floater {
    position: absolute;
    z-index: 4;
    pointer-events: none;
    filter: drop-shadow(0 12px 28px rgba(0, 0, 0, 0.5));
    opacity: 0;
    animation-fill-mode: forwards;
  }

  .floater.f1 { width: 96px;  top: 22%; left: 5%;     animation: fadeIn 0.9s 0.3s var(--easing) forwards, drift1 11s 1.2s ease-in-out infinite; }
  .floater.f2 { width: 80px;  top: 17%; right: 6%;    animation: fadeIn 0.9s 0.5s var(--easing) forwards, drift2 12s 1.4s ease-in-out infinite; }
  .floater.f3 { width: 70px;  bottom: 24%; left: 6%;  animation: fadeIn 0.9s 0.7s var(--easing) forwards, drift3 13s 1.6s ease-in-out infinite; }
  .floater.f4 { width: 86px;  bottom: 19%; right: 5%; animation: fadeIn 0.9s 0.9s var(--easing) forwards, drift4 11.5s 1.8s ease-in-out infinite; }
  .floater.f5 { width: 56px;  top: 50%; left: 2%;     animation: fadeIn 0.9s 1.1s var(--easing) forwards, drift5 14s 2s ease-in-out infinite; }
  .floater.f6 { width: 56px;  top: 46%; right: 2%;    animation: fadeIn 0.9s 1.3s var(--easing) forwards, drift6 13s 2.2s ease-in-out infinite; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 0.78; transform: translateY(0); }
  }

  @keyframes drift1 { 0%,100% { transform: translateY(0) rotate(-4deg); } 50% { transform: translateY(-18px) rotate(2deg); } }
  @keyframes drift2 { 0%,100% { transform: translateY(0) rotate(3deg); } 50% { transform: translateY(-14px) rotate(-3deg); } }
  @keyframes drift3 { 0%,100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-12px) rotate(4deg); } }
  @keyframes drift4 { 0%,100% { transform: translateY(0) rotate(2deg); } 50% { transform: translateY(-16px) rotate(-4deg); } }
  @keyframes drift5 { 0%,100% { transform: translateX(0) rotate(-5deg); } 50% { transform: translateX(10px) rotate(1deg); } }
  @keyframes drift6 { 0%,100% { transform: translateX(0) rotate(4deg); } 50% { transform: translateX(-10px) rotate(-2deg); } }

  /* ═══════════════════════════════════════════
     HERO
     ═══════════════════════════════════════════ */
  .hero {
    position: relative;
    z-index: 5;
    text-align: center;
    margin: auto 0;
    padding: 24px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .pre-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 7px 14px 7px 10px;
    border-radius: 999px;
    background: rgba(15, 15, 15, 0.7);
    border: 1px solid var(--line-strong);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--fg);
    margin-bottom: 26px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
    animation: fadeInDown 0.9s 0.1s var(--easing) backwards;
  }

  .pre-badge .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--brand);
    box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.18);
  }

  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .brand-title {
    font-family: 'Outfit', sans-serif;
    font-size: clamp(72px, 15vw, 220px);
    font-weight: 800;
    letter-spacing: -0.045em;
    line-height: 0.86;
    position: relative;
    z-index: 2;
    background: linear-gradient(180deg,
      #ffffff 0%,
      #f5f5f5 38%,
      #c4c4c4 64%,
      #6e6e6e 88%,
      #3d3d3d 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter:
      drop-shadow(0 1px 0 rgba(255, 255, 255, 0.18))
      drop-shadow(0 2px 0 rgba(0, 0, 0, 0.12))
      drop-shadow(0 24px 40px rgba(0, 0, 0, 0.55))
      drop-shadow(0 56px 80px rgba(0, 0, 0, 0.35));
    animation: titleIn 1s 0.2s var(--easing) backwards;
  }

  @keyframes titleIn {
    from { opacity: 0; transform: translateY(20px) scale(0.98); letter-spacing: -0.02em; }
    to   { opacity: 1; transform: translateY(0) scale(1); letter-spacing: -0.045em; }
  }

  .tagline {
    margin-top: 32px;
    max-width: 580px;
    font-family: 'Outfit', sans-serif;
    font-size: clamp(17px, 2.4vw, 24px);
    font-weight: 400;
    color: rgba(250, 250, 250, 0.92);
    line-height: 1.55;
    letter-spacing: -0.005em;
    text-shadow: 0 2px 16px rgba(0, 0, 0, 0.7);
    animation: fadeInUp 1s 0.45s var(--easing) backwards;
  }

  .tagline .accent {
    font-weight: 600;
    color: var(--fg);
    position: relative;
    display: inline-block;
  }

  .tagline .accent::after {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    bottom: -2px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--brand) 30%, var(--brand) 70%, transparent);
    border-radius: 2px;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Bottom hero block ── */
  .bottom-section {
    margin-top: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
    animation: fadeInUp 1s 0.65s var(--easing) backwards;
  }

  .whisper {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(250, 250, 250, 0.85);
    display: inline-flex;
    align-items: center;
    gap: 12px;
    text-shadow: 0 2px 12px rgba(0, 0, 0, 0.7);
  }

  .whisper .sep {
    display: inline-block;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--brand);
    opacity: 0.9;
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 13px 24px;
    border-radius: 999px;
    background: rgba(15, 15, 15, 0.7);
    border: 1px solid var(--line-strong);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    color: var(--fg);
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    font-weight: 500;
    letter-spacing: 0.005em;
    transition: transform 0.4s var(--easing), border-color 0.3s, background 0.3s, box-shadow 0.3s;
    box-shadow: 0 8px 28px rgba(0, 0, 0, 0.4);
    position: relative;
    overflow: hidden;
  }

  .cta-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 30% 50%, rgba(220, 38, 38, 0.22), transparent 60%);
    opacity: 0;
    transition: opacity 0.4s var(--easing);
  }

  .cta-btn:hover {
    border-color: rgba(220, 38, 38, 0.5);
    transform: translateY(-2px);
    box-shadow: 0 14px 36px rgba(220, 38, 38, 0.18), 0 8px 24px rgba(0, 0, 0, 0.4);
  }

  .cta-btn:hover::before { opacity: 1; }

  .cta-btn > * { position: relative; z-index: 1; }

  .cta-btn svg { width: 15px; height: 15px; opacity: 0.75; flex-shrink: 0; }
  .cta-btn:hover svg { opacity: 1; }

  .cta-btn .arr { transition: transform 0.3s var(--easing); }
  .cta-btn:hover .arr { transform: translateX(3px); }

  /* ═══════════════════════════════════════════
     FOOTER
     ═══════════════════════════════════════════ */
  .foot {
    position: relative;
    z-index: 10;
    margin-top: auto;
    padding-top: 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .foot-credit {
    font-size: 12px;
    color: var(--fg-dim);
    font-weight: 400;
  }

  .foot-credit .fn {
    color: var(--fg);
    font-weight: 600;
    transition: color 0.25s var(--easing);
    border-bottom: 1px solid transparent;
    padding-bottom: 1px;
  }

  .foot-credit a:hover .fn {
    color: var(--brand-2);
    border-bottom-color: rgba(239, 68, 68, 0.5);
  }

  .foot-credit .ext {
    width: 11px;
    height: 11px;
    opacity: 0.5;
    transition: opacity 0.25s, transform 0.25s var(--easing);
  }

  .foot-credit a:hover .ext {
    opacity: 1;
    transform: translate(2px, -2px);
  }

  .foot-copy {
    font-size: 12px;
    color: var(--fg-mute);
    font-weight: 400;
  }

  /* ═══════════════════════════════════════════
     RESPONSIVE
     ═══════════════════════════════════════════ */
  @media (max-width: 800px) {
    .stage { padding: 8px; }
    .canvas { padding: 18px 16px 16px; min-height: calc(100vh - 16px); border-radius: 20px; }
    .bg-glow { inset: -30%; filter: blur(40px); }
    .bg-centerpiece-glow { width: min(140vw, 800px); height: 180px; top: 56%; }
    .bg-centerpiece { width: min(132vw, 760px); top: 56%; opacity: 0.36; }
    .top-bar { flex-wrap: wrap; gap: 8px; }
    .chip { font-size: 11px; padding: 8px 14px; gap: 8px; }
    .nav-status { display: none; }
    .v-label { display: none; }
    .pre-badge { font-size: 10px; padding: 6px 12px 6px 9px; letter-spacing: 0.16em; margin-bottom: 22px; }
    .brand-title { font-size: clamp(54px, 18vw, 110px); }
    .tagline { margin-top: 24px; font-size: 16px; padding: 0 12px; }
    .bottom-section { margin-top: 30px; gap: 18px; }
    .whisper { font-size: 9.5px; letter-spacing: 0.26em; gap: 8px; }
    .cta-btn { font-size: 12.5px; padding: 11px 20px; }
    .floater.f1 { width: 56px; top: 18%; left: 3%; }
    .floater.f2 { width: 50px; top: 13%; right: 3%; }
    .floater.f3 { width: 46px; bottom: 28%; left: 3%; }
    .floater.f4 { width: 52px; bottom: 22%; right: 3%; }
    .floater.f5, .floater.f6 { display: none; }
    .foot { flex-direction: column; gap: 10px; text-align: center; padding-top: 20px; }
    .foot-credit, .foot-copy { font-size: 11px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="canvas">

    <div class="bg-mesh"></div>
    <div class="bg-glow"></div>
    <div class="bg-grid"></div>
    <div class="bg-centerpiece-glow"></div>
    <svg class="bg-centerpiece" viewBox="0 0 1000 320" aria-hidden="true">
      <defs>
        <linearGradient id="bgBar" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="#f8fafc" stop-opacity="0.92"/>
          <stop offset="1" stop-color="#cbd5e1" stop-opacity="0.6"/>
        </linearGradient>
        <linearGradient id="bgPlate" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#dc2626" stop-opacity="0.92"/>
          <stop offset="1" stop-color="#7f1d1d" stop-opacity="0.88"/>
        </linearGradient>
      </defs>
      <rect x="284" y="148" width="432" height="22" rx="11" fill="url(#bgBar)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <rect x="300" y="153" width="400" height="5" rx="2.5" fill="rgba(255,255,255,0.3)"/>
      <g>
        <rect x="78" y="106" width="64" height="108" rx="12" fill="url(#bgPlate)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
        <rect x="150" y="92" width="82" height="136" rx="14" fill="url(#bgPlate)" stroke="rgba(255,255,255,0.22)" stroke-width="1.2"/>
        <rect x="240" y="82" width="34" height="156" rx="9" fill="#f8fafc" fill-opacity="0.6"/>
